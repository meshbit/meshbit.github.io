version: "3.8"

services:
  pansou:
    image: ghcr.io/fish2018/pansou-web:latest
    container_name: pansou
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./data:/app/data
      - ./frontend/dist:/app/frontend/dist
    environment:
      - TZ=Asia/Shanghai
      - PANSOU_PORT=8888
      - PANSOU_HOST=127.0.0.1
      - CACHE_PATH=/app/data/cache
      - LOG_PATH=/app/data/logs
      - CACHE_ENABLED=true
      - CACHE_TTL=60
      - MAX_CONCURRENCY=200
      - MAX_PAGES=30
      - HEALTH_CHECK_INTERVAL=30
      - HEALTH_CHECK_TIMEOUT=10
      - HEALTH_CHECK_RETRIES=3
      - CHANNELS=AliyunDrive_Share_Channel,Aliyun_4K_Movies,BaiduCloudDisk,Baidu_netdisk,BooksRealm,CBduanju,Channel_Shares_115,Cundang,D_wusun,FLMdongtianfudi,FenXiang_ZY,KaiPanshare,Lsp115,MCPH01,MCPH02,MCPH03,MCPH086,Maidanglaocom,Movie888035,Netdisk_Movies,NewAliPan,NewQuark,Oscar_4Kmovies,PanjClub,PikPak_Share_Channel,Q66Share,QQZYDAPP,Q_dianying,Q_dongman,Q_jilupian,QuarkFree,Quark_Movies,Quark_Share_Channel,QukanMovie,SharePanFilms,ShareYunPan,TG654TG,TGxiazai,WFYSFX02,WFYSFX03,WPpindao,XiangxiuNBB,XunLeiPinDao,a123fxme,alipanshare,aliyunys,alyp_1,alyp_4K_Movies,alyp_Animation,alyp_JLP,alyp_TV,ammmziyuan,baicaoZY,baidu_yppan,baiduyun,bdbdndn11,bdwpzhpd,bsbdbfjfjff,btzhi,cctv1211,cili8888,cilidianying,ciliziyuanku,clouddriveresources,cloudtianyi,dianying4k,dianyingshare,djya5,domgmingapk,douerpan,duan_ju,dzsgx,gimy100,gimy115,gimy115iso,godupan,gokuapan,gotopan,guoman4K,hdhhd21,iAliyun,jdjdn1111,jxwpzy,jzmm_123pan,kduanju,kkdj001,kkxlzy,kuakedongman,kuakeyun,kuyupan,leoziyuan,liangxingzhinan,movielover8888_film3,newproductsourcing,oneonefivewpfx,pan_guangya,peccxin,peccxinpd,pxyunpanxunlei,q_dianshiju,qixingzhenren,quanziyuanshe,quarkshare,rjyxfx,sbsbsnsqq,shareAliyun,share_aliyun,sharepan,solidsexydoll,taoxgzy,tgbokee,tgsearchers115,tgsearchers3,tgsearchers7,tgxiazaiyuan,tianyifc,tianyirigeng,tiefenxiang,txtyzy,tyypzhpd,tyysypzypd,ucquark,ucshare,ucwpzy,vip115hot,wp123zy,wpanzy,wydwpzy,xiangnikanj,xingqiump4,xlwpzy,xx123pan,xxzlzn,ydwpzy,ydypzyfx,yeqingjie_GJG666,yggpan,yingshifenxiang123,yoyokuakeduanju,yp123pan,ypqkzy,ypquark,ysxb48,yunpan139,yunpan189,yunpanNB,yunpanpan,yunpanqk,yunpanquark,yunpanuc,yunpanx,yunpanxunlei,yydf_hzl,zaihuayun,zdqxm,ziyuanhezi,zyfb123,zygxq,zyywpzy
